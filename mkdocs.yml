site_name: FIRST Documentation
site_description: Federated Inference Resource Scheduling Toolkit - Documentation for deploying and using LLM inference as a service
site_author: Argonne National Laboratory
site_url: https://argonne-lcf.github.io/FIRST/

repo_name: argonne-lcf/FIRST
repo_url: https://github.com/argonne-lcf/FIRST
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Administrator Guide:
      - Overview: admin-guide/index.md
      - Gateway Installation:
          - Globus Setup: admin-guide/gateway-setup/globus-setup.md
          - Docker Deployment: admin-guide/gateway-setup/docker.md
          - Bare Metal Setup: admin-guide/gateway-setup/bare-metal.md
          - Configuration Reference: admin-guide/gateway-setup/configuration.md
      - Inference Backend Setup:
          - Overview: admin-guide/inference-setup/index.md
          - Globus Compute + vLLM: admin-guide/inference-setup/globus-compute.md
          - Local vLLM Setup: admin-guide/inference-setup/local-vllm.md
          - Direct API Connection: admin-guide/inference-setup/direct-api.md
      - Connecting Gateway to Backends:
          - Overview: admin-guide/connecting-gateway-to-backend/index.md
          - Globus Compute Adaptors: admin-guide/connecting-gateway-to-backend/globus-compute.md
          - Direct API Adaptors: admin-guide/connecting-gateway-to-backend/direct-api.md
          - Custom Adaptors: admin-guide/connecting-gateway-to-backend/custom.md
      - Deployment:
          - Kubernetes: admin-guide/deployment/kubernetes.md
          - Production Best Practices: admin-guide/deployment/production.md
      - Monitoring & Troubleshooting: admin-guide/monitoring.md
  - User Guide: user-guide/index.md
  - Reference:
      - Citation: reference/citation.md
      - API Endpoints: reference/api.md
      - Configuration Options: reference/config.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/argonne-lcf/FIRST
    - icon: fontawesome/solid/book
      link: https://doi.org/10.1145/3731599.3767346

